name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Test & Build ─────────────────────────────────────────────────────────────
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm einrichten
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: Bauen (alle Pakete)
        run: pnpm build

      - name: Tests ausführen
        run: pnpm test

  # ── Integrationstests (echtes PostgreSQL) ────────────────────────────────────
  integration:
    name: Integrationstests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER:     kassa
          POSTGRES_PASSWORD: kassa
          POSTGRES_DB:       kassa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kassa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm einrichten
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: Backend samt Abhängigkeiten bauen
        run: pnpm --filter @kassa/backend... build

      - name: Integrationstests ausführen
        run: pnpm --filter @kassa/backend test:integration
        env:
          TEST_DATABASE_URL: postgresql://kassa:kassa@localhost:5432/kassa

  # ── Docker-Images bauen (nur auf master, nach erfolgreichem Test) ─────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Backend-Image bauen
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       packages/backend/Dockerfile
          push:       false
          tags:       kassa/backend:latest,kassa/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Frontend-Image bauen
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       packages/frontend/Dockerfile
          push:       false
          tags:       kassa/frontend:latest,kassa/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: KDS-Image bauen
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       packages/kds/Dockerfile
          push:       false
          tags:       kassa/kds:latest,kassa/kds:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Kundendisplay-Image bauen
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       packages/kundendisplay/Dockerfile
          push:       false
          tags:       kassa/kundendisplay:latest,kassa/kundendisplay:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Gast-Image bauen
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       packages/gast/Dockerfile
          push:       false
          tags:       kassa/gast:latest,kassa/gast:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Kellner-Image bauen
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       packages/kellner/Dockerfile
          push:       false
          tags:       kassa/kellner:latest,kassa/kellner:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
