name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Test & Build ─────────────────────────────────────────────────────────────
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm einrichten
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: Migrations-Integrität prüfen (Journal ↔ SQL-Dateien)
        run: pnpm --filter @kassa/backend check:migrations

      - name: Bauen (alle Pakete)
        run: pnpm build

      - name: Tests ausführen
        run: pnpm test

  # ── Integrationstests (echtes PostgreSQL) ────────────────────────────────────
  integration:
    name: Integrationstests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER:     kassa
          POSTGRES_PASSWORD: kassa
          POSTGRES_DB:       kassa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kassa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm einrichten
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: Backend samt Abhängigkeiten bauen
        run: pnpm --filter @kassa/backend... build

      - name: Integrationstests ausführen
        run: pnpm --filter @kassa/backend test:integration
        env:
          TEST_DATABASE_URL: postgresql://kassa:kassa@localhost:5432/kassa

  # ── Dependency-Audit (Build rot bei high/critical) ───────────────────────────
  audit:
    name: Security-Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm einrichten
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      # Schlägt nur bei high/critical fehl; moderate/low werden gemeldet, brechen
      # den Build aber nicht (sonst Dauer-Rot durch Advisories ohne Fix).
      - name: Produktions-Abhängigkeiten auditieren
        run: pnpm audit --prod --audit-level high

  # ── End-to-End (Playwright, echtes PostgreSQL, FinanzOnline gestubt) ──────────
  e2e:
    name: E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER:     kassa
          POSTGRES_PASSWORD: kassa
          POSTGRES_DB:       kassa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kassa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm einrichten
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      # @kassa/shared + @kassa/rksv bauen (Backend via tsx und Frontend-Build
      # importieren daraus). Der E2E-Runner baut das Frontend selbst (vite build).
      - name: Backend-Abhängigkeiten bauen
        run: pnpm --filter @kassa/backend... build

      - name: Playwright-Browser installieren
        run: pnpm --filter @kassa/frontend exec playwright install --with-deps chromium

      - name: E2E ausführen
        run: pnpm --filter @kassa/frontend test:e2e
        env:
          E2E_BASIS_DATABASE_URL: postgresql://kassa:kassa@localhost:5432/kassa

  # ── Backup-E2E: Off-Site-Backup gegen lokales MinIO (der "Box-Test") ─────────
  backup-e2e:
    name: Backup-E2E (restic → MinIO)
    runs-on: ubuntu-latest
    env:
      # Dev- + MinIO-Override: Backend bootet ohne echte Secrets, restic zeigt
      # auf lokales MinIO. In jedem Schritt verfügbar.
      COMPOSE: docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.minio.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Minimal-.env (Basis-Interpolation; Dev-Override setzt die echten Werte)
        run: |
          cat > .env <<'EOF'
          POSTGRES_PASSWORD=kassa
          MASTER_PASSPHRASE=ci-master-passphrase-1234567890
          JWT_SECRET=ci-jwt-secret-key-mindestens-32-zeichen-lang
          EOF

      - name: Stack starten (Backend + Backup + MinIO, ohne Frontends)
        run: $COMPOSE up -d --build backup

      - name: Auf restic-Repository warten
        run: |
          for i in $(seq 1 60); do
            $COMPOSE exec -T backup restic snapshots >/dev/null 2>&1 && { echo "Repo bereit"; exit 0; }
            echo "warte auf restic/MinIO ($i) ..."; sleep 2
          done
          echo "Repo wurde nicht rechtzeitig erreichbar"; exit 1

      - name: Dummy-Sicherung erzeugen (nicht-leeres Backup)
        run: $COMPOSE exec -T backend sh -c 'mkdir -p /data/db-backups && echo CI-dump > /data/db-backups/ci-test.sql'

      - name: Backup verifizieren (ops/backup/test-backup.sh)
        run: ./ops/backup/test-backup.sh

      - name: Logs bei Fehler
        if: failure()
        run: $COMPOSE logs --tail=200

      - name: Aufräumen
        if: always()
        run: $COMPOSE down -v

  # ── Docker-Images bauen & nach GHCR pushen (nur auf master, nach grünen Gates) ─
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, integration, e2e]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write   # für GHCR-Push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend-Image bauen
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       packages/backend/Dockerfile
          push:       true
          tags:       ghcr.io/${{ github.repository_owner }}/kassa-backend:latest,ghcr.io/${{ github.repository_owner }}/kassa-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Frontend-Image bauen
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       packages/frontend/Dockerfile
          push:       true
          tags:       ghcr.io/${{ github.repository_owner }}/kassa-frontend:latest,ghcr.io/${{ github.repository_owner }}/kassa-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: KDS-Image bauen
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       packages/kds/Dockerfile
          push:       true
          tags:       ghcr.io/${{ github.repository_owner }}/kassa-kds:latest,ghcr.io/${{ github.repository_owner }}/kassa-kds:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Kundendisplay-Image bauen
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       packages/kundendisplay/Dockerfile
          push:       true
          tags:       ghcr.io/${{ github.repository_owner }}/kassa-kundendisplay:latest,ghcr.io/${{ github.repository_owner }}/kassa-kundendisplay:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Gast-Image bauen
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       packages/gast/Dockerfile
          push:       true
          tags:       ghcr.io/${{ github.repository_owner }}/kassa-gast:latest,ghcr.io/${{ github.repository_owner }}/kassa-gast:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Kellner-Image bauen
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       packages/kellner/Dockerfile
          push:       true
          tags:       ghcr.io/${{ github.repository_owner }}/kassa-kellner:latest,ghcr.io/${{ github.repository_owner }}/kassa-kellner:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
