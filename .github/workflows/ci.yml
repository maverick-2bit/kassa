name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Test & Build ─────────────────────────────────────────────────────────────
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm einrichten
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: Bauen (alle Pakete)
        run: pnpm build

      - name: Tests ausführen
        run: pnpm test

  # ── Docker-Images bauen (nur auf main, nach erfolgreichem Test) ───────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      # ── Backend-Image ────────────────────────────────────────────────────────
      - name: Backend-Image bauen
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       packages/backend/Dockerfile
          push:       false          # auf true setzen + login hinzufügen, wenn Registry vorhanden
          tags:       kassa/backend:latest,kassa/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Frontend-Image ───────────────────────────────────────────────────────
      - name: Frontend-Image bauen
        uses: docker/build-push-action@v6
        with:
          context:    .
          file:       packages/frontend/Dockerfile
          push:       false
          tags:       kassa/frontend:latest,kassa/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
