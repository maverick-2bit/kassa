server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Gzip-Komprimierung für statische Assets
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/wasm;
    gzip_min_length 1024;

    # ── API-Proxy → Backend ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts etwas großzügiger (RKSV-Beleg-Erstellung kann dauern)
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── SSE-Proxy (Kitchen-Display, Long-Poll) ────────────────────────────────
    location /sse/ {
        proxy_pass          http://backend:3000;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    Cache-Control     no-cache;

        # SSE braucht langen Timeout und kein Buffering
        proxy_read_timeout  3600s;
        proxy_buffering     off;
        chunked_transfer_encoding on;
    }

    # ── Statische Assets mit langem Cache ────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|svg|png|jpg|ico|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # ── React Router (Client-Side Routing) ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
