server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────────────────────────────
    # Kein Clickjacking
    add_header X-Frame-Options           "DENY"                              always;
    # Kein MIME-Type-Sniffing
    add_header X-Content-Type-Options    "nosniff"                           always;
    # Kein Referrer zu Drittseiten
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    # Browser-Features einschränken
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # XSS-Schutz (ältere Browser)
    add_header X-XSS-Protection          "1; mode=block"                     always;
    # CSP: nur eigene Ressourcen + inline-Styles (Tailwind)
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; object-src 'none'; frame-ancestors 'none';"
      always;
    # HSTS: 1 Jahr HTTPS-Only (nur wenn hinter HTTPS-Proxy aktiv)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip-Komprimierung ────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/wasm;
    gzip_min_length 1024;

    # ── API-Proxy → Backend ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts etwas großzügiger (RKSV-Beleg-Erstellung kann dauern)
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── SSE-Proxy (Kitchen-Display, Long-Poll) ────────────────────────────────
    location /sse/ {
        proxy_pass          http://backend:3000;
        proxy_http_version  1.1;
        proxy_set_header    Connection        "";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    Cache-Control     no-cache;

        # SSE braucht langen Timeout und kein Buffering
        proxy_read_timeout  3600s;
        proxy_buffering     off;
        chunked_transfer_encoding on;
    }

    # ── Statische Assets mit langem Cache ────────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|svg|png|jpg|ico|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # ── React Router (Client-Side Routing) ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
