services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       kassa
      POSTGRES_USER:     kassa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U kassa -d kassa"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── Backend (Fastify + Drizzle) ─────────────────────────────────────────────
  backend:
    build:
      context:    .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:      postgresql://kassa:${POSTGRES_PASSWORD}@postgres:5432/kassa
      MASTER_PASSPHRASE: ${MASTER_PASSPHRASE}
      JWT_SECRET:        ${JWT_SECRET}
      JWT_EXPIRES_IN:    ${JWT_EXPIRES_IN:-8h}
      PORT:              3000
      LOG_LEVEL:         ${LOG_LEVEL:-info}
      CORS_ORIGIN:       ${CORS_ORIGIN:-http://localhost}
      NODE_ENV:          production
    healthcheck:
      # wget ist in alpine enthalten; node:22-alpine bringt es mit
      test:         ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q 'ok'"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 30s

  # ── Frontend (Vite → nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context:    .
      dockerfile: packages/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

  # ── KDS-Display (Vite → nginx) ───────────────────────────────────────────────
  kds:
    build:
      context:    .
      dockerfile: packages/kds/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${KDS_PORT:-8080}:80"

volumes:
  postgres_data:
