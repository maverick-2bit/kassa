# Fester Compose-Projektname: Image-/Container-/Volume-Namen sind damit
# unabhängig vom Verzeichnisnamen — Voraussetzung dafür, dass offline
# transportierte Images (docker save/load) auf dem Ziel-PC gefunden werden.
name: kassa

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       kassa
      POSTGRES_USER:     kassa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U kassa -d kassa"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── Backend (Fastify + Drizzle) ─────────────────────────────────────────────
  backend:
    build:
      context:    .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:      postgresql://kassa:${POSTGRES_PASSWORD}@postgres:5432/kassa
      MASTER_PASSPHRASE: ${MASTER_PASSPHRASE}
      JWT_SECRET:        ${JWT_SECRET}
      JWT_EXPIRES_IN:    ${JWT_EXPIRES_IN:-8h}
      PORT:              3000
      LOG_LEVEL:         ${LOG_LEVEL:-info}
      CORS_ORIGIN:       ${CORS_ORIGIN:-http://localhost}
      NODE_ENV:          production
      DB_BACKUP_DIR:     /data/db-backups
      DB_BACKUP_RETENTION: ${DB_BACKUP_RETENTION:-30}
      DEP_BACKUP_DIR:    /data/dep-backups
      MONITORING_TOKEN:  ${MONITORING_TOKEN:-}
    volumes:
      - db_backups:/data/db-backups
      - dep_backups:/data/dep-backups
    healthcheck:
      # Check mit Node selbst (garantiert im Image) statt wget: busybox-wget +
      # localhost-Auflösung erwiesen sich im Erstlauf als unzuverlässig
      # (Container blieb trotz laufendem Server dauerhaft "unhealthy").
      # 127.0.0.1 statt localhost vermeidet zudem die IPv6-(::1)-Falle.
      test:         ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval:     10s
      timeout:      5s
      retries:      5
      start_period: 30s

  # ── Frontend (Vite → nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context:    .
      dockerfile: packages/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

  # ── Kundendisplay (Vite → nginx) ─────────────────────────────────────────────
  kundendisplay:
    build:
      context:    .
      dockerfile: packages/kundendisplay/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${KUNDENDISPLAY_PORT:-8081}:80"

  # ── KDS-Display (Vite → nginx) ───────────────────────────────────────────────
  kds:
    build:
      context:    .
      dockerfile: packages/kds/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${KDS_PORT:-8080}:80"

  # ── Gast-Bestellsystem (Vite → nginx) ──────────────────────────────────────
  gast:
    build:
      context:    .
      dockerfile: packages/gast/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${GAST_PORT:-8082}:80"

  # ── Kellner-App (Vite → nginx) ───────────────────────────────────────────────
  kellner:
    build:
      context:    .
      dockerfile: packages/kellner/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${KELLNER_PORT:-8083}:80"

  # ── SB-Bestellterminal (Vite → nginx) ────────────────────────────────────────
  terminal:
    build:
      context:    .
      dockerfile: packages/terminal/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${TERMINAL_PORT:-8084}:80"

  # ── Abholmonitor (Vite → nginx) ──────────────────────────────────────────────
  abholmonitor:
    build:
      context:    .
      dockerfile: packages/abholmonitor/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${ABHOLMONITOR_PORT:-8085}:80"

  # ── Off-Site-Backup (restic → S3-kompatibel) ────────────────────────────────
  # Schiebt die vom Backend erzeugten DB- und DEP-Sicherungen verschlüsselt und
  # dedupliziert an externen Object-Storage. Ohne RESTIC_REPOSITORY/RESTIC_PASSWORD
  # tut der Service nichts (loggt eine Warnung) — Backup ist also opt-in.
  backup:
    image: restic/restic:0.17.3
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/restic-backup.sh"]
    depends_on:
      - backend
    environment:
      RESTIC_REPOSITORY:     ${RESTIC_REPOSITORY:-}
      RESTIC_PASSWORD:       ${RESTIC_PASSWORD:-}
      AWS_ACCESS_KEY_ID:     ${RESTIC_S3_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${RESTIC_S3_SECRET_ACCESS_KEY:-}
      # Aufbewahrung im externen Repo (restic forget --prune)
      RESTIC_KEEP_DAILY:     ${RESTIC_KEEP_DAILY:-14}
      RESTIC_KEEP_WEEKLY:    ${RESTIC_KEEP_WEEKLY:-8}
      RESTIC_KEEP_MONTHLY:   ${RESTIC_KEEP_MONTHLY:-84}   # 7 Jahre (RKSV-Aufbewahrung)
      # Lauf-Uhrzeit (Stunde, lokale Containerzeit) — nach den Backend-Crons (2-3 Uhr)
      BACKUP_STUNDE:         ${BACKUP_STUNDE:-4}
    volumes:
      - db_backups:/data/db-backups:ro
      - dep_backups:/data/dep-backups:ro
      - restic_cache:/root/.cache/restic
      - backup_status:/status
      - ./ops/backup/restic-backup.sh:/restic-backup.sh:ro
      - ./ops/backup/restic-healthcheck.sh:/restic-healthcheck.sh:ro
    healthcheck:
      # Ungesund, wenn das letzte erfolgreiche Backup zu alt ist (oder nie lief).
      # Deaktiviertes Backup (kein Repo) gilt als gesund.
      test:         ["CMD", "/bin/sh", "/restic-healthcheck.sh"]
      interval:     1h
      timeout:      10s
      retries:      2
      start_period: 30m   # Zeit für den initialen Backup-Lauf beim Start

  # ── Reverse-Proxy (Caddy) — OPTIONAL, nur mit „--profile proxy" ──────────────
  # Ein einziger Eingang mit automatischem HTTPS (Let's Encrypt) statt Ports.
  # Aktivieren:  docker compose --profile proxy up -d
  # Voraussetzung: KASSA_DOMAIN gesetzt + DNS-Records der Subdomains (kasse.,
  # kds., terminal., …) bzw. ein Wildcard-Record zeigen auf diese Box.
  # Caddy erreicht die App-Container intern per Servicename — die Host-Ports der
  # Apps oben bleiben für den LAN-Modus erhalten, werden vom Proxy aber nicht genutzt.
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    profiles: ["proxy"]
    depends_on:
      - frontend
    environment:
      KASSA_DOMAIN: ${KASSA_DOMAIN:-}
      ACME_EMAIL:   ${ACME_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./ops/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  db_backups:
  dep_backups:
  restic_cache:
  backup_status:
  caddy_data:
  caddy_config:
